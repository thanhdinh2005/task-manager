name: CI/CD Pipeline for Task Manager

# Pipeline chạy khi có code mới đẩy lên nhánh main
on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: KIỂM TRA CHẤT LƯỢNG CODE (TEST)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with H2
        working-directory: ./backend
        run: ./mvnw clean verify -Dspring.profiles.active=dev

  # ==========================================
  # JOB 2: ĐÓNG GÓI VÀ ĐẨY LÊN DOCKER HUB
  # ==========================================
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      git-sha: ${{ steps.git-sha.outputs.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Git SHA
        id: git-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Metadata (Tạo Tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api:buildcache,mode=max

  # ==========================================
  # JOB 3: DEPLOY TO HOMELAB
  # ==========================================
  deploy-to-homelab:
    needs: [build-and-test, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Homelab
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SSH_USER }}
          GIT_SHA: ${{ needs.build-and-push.outputs.git-sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          cat <<EOF > ~/.ssh/config
          Host homelab
            HostName $HOST
            User $USER
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config
          
          ssh homelab bash -c '
            set -e
          
            APP_PORT="8081"
            HEALTH_CHECK_URL="http://localhost:${APP_PORT}/actuator/health/ready"
          
            echo "=================================="
            echo "🚀 Deploying to homelab..."
            echo "Git SHA: ${{ env.GIT_SHA }}"
            echo "Docker Image: ${{ env.DOCKERHUB_USERNAME }}/task-manager-api:${{ env.GIT_SHA }}"
            echo "=================================="
          
            cd ~/task-manager-deploy/app
          
            # Check .env
            if [ ! -f .env ]; then
              echo "❌ .env file not found"
              exit 1
            fi
          
            # Update APP_VERSION
            echo "📝 Setting APP_VERSION=${{ env.GIT_SHA }} in .env..."
            if grep -q "^APP_VERSION=" .env; then
              sed -i "s/^APP_VERSION=.*/APP_VERSION=${{ env.GIT_SHA }}/" .env
            else
              echo "APP_VERSION=${{ env.GIT_SHA }}" >> .env
            fi
          
            echo "✅ .env updated:"
            grep "^APP_VERSION=" .env
            echo ""
          
            # Get current image
            echo "📸 Current state:"
            docker compose images backend || echo "No image running"
            echo ""
          
            # Pull image
            echo "📥 Pulling latest image..."
            docker compose pull backend || { echo "❌ Failed to pull"; exit 1; }
          
            # Stop gracefully
            echo ""
            echo "⏸️  Stopping backend (30s graceful shutdown)..."
            docker compose stop -t 30 backend || true
            sleep 2
          
            # Start
            echo "🚀 Starting backend..."
            docker compose up -d backend || { echo "❌ Failed to start"; docker compose logs backend --tail 20; exit 1; }
          
            # Health check
            echo ""
            echo "⏳ Health check (up to 30s)..."
            RETRY=0
            while [ $RETRY -lt 30 ]; do
              if curl -s -f "$HEALTH_CHECK_URL" > /dev/null 2>&1; then
                echo "✅ App is healthy!"
                break
              fi
              RETRY=$((RETRY + 1))
              if [ $RETRY -lt 30 ]; then
                echo "  Attempt $RETRY/30..."
                sleep 1
              fi
            done
          
            if [ $RETRY -eq 30 ]; then
              echo "❌ App not healthy after 30s"
              echo "📋 Logs:"
              docker logs task_app --tail 30 || true
              exit 1
            fi
          
            # Cleanup
            echo ""
            echo "🧹 Cleaning up..."
            docker image prune -f
          
            # Success
            echo ""
            echo "✅ ========== DEPLOYMENT SUCCESSFUL =========="
            echo "Version: ${{ env.GIT_SHA }}"
            echo "Image: ${{ env.DOCKERHUB_USERNAME }}/task-manager-api:${{ env.GIT_SHA }}"
            echo ""
          '

      - name: Verify Deployment
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          cat <<EOF > ~/.ssh/config
          Host homelab
            HostName $HOST
            User $USER
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config
          
          echo ""
          echo "🔍 Final verification:"
          ssh homelab << 'EOF'
            echo ""
            echo "Running containers:"
            docker ps --filter "name=task" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
            echo ""
            echo "App health check:"
            curl -s http://localhost:8081/actuator/health/ready | jq . || echo "Health endpoint: checking..."
            echo ""
          EOF