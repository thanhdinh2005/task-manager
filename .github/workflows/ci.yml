name: Build and Publish Docker Image

# This workflow runs on push to main branch
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    # 1. Checkout the code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Java 21 (needed for Maven build)
    - name: Set Up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Cache Maven dependencies (speeds up builds)
    - name: Cache Maven Packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('backend/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2

    # 4. Build and test the application (using H2 for fast unit tests)
    - name: Build and Test with H2
      working-directory: ./backend
      run: ./mvnw clean verify -Dspring.profiles.active=dev

    # 5. Set up Docker Buildx (for better caching and multi-platform support)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 6. Log in to Docker Hub (using secrets for security)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 7. Extract metadata (tags, labels) for Docker image
    - name: Extract Docker Metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api
        tags:
          - type=sha,format=long
          - type=ref,event=branch
          - type=ref,event=pr
          - type=semver,pattern={{version}}
          - type=semver,pattern={{major}}.{{minor}}
          - type=semver,pattern={{major}}
          - type=latest

    # 8. Build and push Docker image
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # Cache layers to speed up subsequent builds
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api:buildcache,mode=max

    # 9. Image size check (good DevOps practice)
    - name: Check Image Size
      if: always()
      run: |
        echo "Image size information:"
        docker images ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api