name: CI/CD Pipeline for Task Manager

# Pipeline chạy khi có code mới đẩy lên nhánh main
on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: KIỂM TRA CHẤT LƯỢNG CODE (TEST)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with H2
        working-directory: ./backend
        run: ./mvnw clean verify -Dspring.profiles.active=dev

  # ==========================================
  # JOB 2: ĐÓNG GÓI VÀ ĐẨY LÊN DOCKER HUB
  # ==========================================
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Metadata (Tạo Tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api:buildcache,mode=max

  # ==========================================
  # JOB 3: DEPLOY
  # ==========================================
  # ==========================================
  # JOB 3: DEPLOY (NATIVE SSH QUA TAILSCALE)
  # ==========================================
  deploy-to-homelab:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set up Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}

      - name: Native SSH and Deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SSH_USER }}
        run: |
          # 1. Debug kiểm tra xem biến có được nạp đủ dòng không (Đếm số dòng)
          echo "Số dòng của Private Key được nạp:"
          echo "$SSH_KEY" | wc -l
          
          # 2. Tạo thư mục SSH ẩn an toàn trên runner
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 3. Ghi Private Key từ Secret ra một file vật lý và cấp quyền 600
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # 4. Tắt chế độ StrictHostKeyChecking (tránh bị hỏi "Are you sure you want to continue connecting (yes/no)?")
          cat <<EOF > ~/.ssh/config
          Host homelab
            HostName $HOST
            User $USER
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config
          
          # 5. SSH thẳng vào server và chạy kịch bản Deploy
          ssh homelab << 'EOF'
            cd ~/task-manager-deploy
            
            echo "Pulling latest image from Docker Hub..."
            docker compose pull
            
            echo "Restarting services..."
            docker compose up -d
            
            echo "Cleaning up old images to save disk space..."
            docker image prune -f
          EOF