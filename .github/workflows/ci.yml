name: CI/CD Pipeline for Task Manager

# Pipeline chạy khi có code mới đẩy lên nhánh main
on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: KIỂM TRA CHẤT LƯỢNG CODE (TEST)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with H2
        working-directory: ./backend
        run: ./mvnw clean verify -Dspring.profiles.active=dev

  # ==========================================
  # JOB 2: ĐÓNG GÓI VÀ ĐẨY LÊN DOCKER HUB
  # ==========================================
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      git-sha: ${{ steps.git-sha.outputs.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Git SHA
        id: git-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Metadata (Tạo Tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api:buildcache,mode=max

  # ==========================================
  # JOB 3: DEPLOY TO HOMELAB
  # ==========================================
  deploy-to-homelab:
    needs: [build-and-test, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Homelab
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SSH_USER }}
          GIT_SHA: ${{ needs.build-and-push.outputs.git-sha }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          cat <<EOF > ~/.ssh/config
          Host homelab
            HostName $HOST
            User $USER
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config
          
          # Deploy script
          ssh homelab << 'EOF'
            set -e
          
            APP_PORT="8081"
            GIT_SHA="${{ needs.build-and-push.outputs.git-sha }}"
            DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            HEALTH_CHECK_URL="http://localhost:${APP_PORT}/actuator/health/ready"
          
            echo "=================================="
            echo "🚀 Deploying to homelab..."
            echo "Git SHA: $GIT_SHA"
            echo "Docker Image: $DOCKERHUB_USERNAME/task-manager-api:$GIT_SHA"
            echo "=================================="
          
            cd ~/task-manager-deploy/app
          
            # Step 1: Ensure .env file exists
            if [ ! -f .env ]; then
              echo "❌ .env file not found in ~/task-manager-deploy/app/"
              echo "Create it with: APP_VERSION, DB_NAME, DB_USERNAME, DB_PASSWORD, APP_PORT, DOCKERHUB_USERNAME"
              exit 1
            fi
          
            # Step 2: Update APP_VERSION in .env
            echo "📝 Setting APP_VERSION=$GIT_SHA in .env..."
            if grep -q "^APP_VERSION=" .env; then
              sed -i "s/^APP_VERSION=.*/APP_VERSION=$GIT_SHA/" .env
            else
              echo "APP_VERSION=$GIT_SHA" >> .env
            fi
          
            # Verify .env has required variables
            for var in DOCKERHUB_USERNAME DB_NAME DB_USERNAME DB_PASSWORD APP_PORT; do
              if ! grep -q "^$var=" .env; then
                echo "❌ Missing $var in .env"
                exit 1
              fi
            done
          
            # Step 3: Get current image (for reference)
            echo "📸 Current state:"
            CURRENT_IMAGE=$(docker compose images backend 2>/dev/null | tail -1 | awk '{print $2}' || echo "none")
            echo "Running image: $CURRENT_IMAGE"
          
            # Step 4: Pull latest image
            echo ""
            echo "📥 Pulling latest image from Docker Hub..."
            echo "   Image: $DOCKERHUB_USERNAME/task-manager-api:$GIT_SHA"
            if ! docker compose pull backend; then
              echo "❌ Failed to pull image"
              echo ""
              echo "Troubleshooting:"
              echo "1. Check image exists on Docker Hub: $DOCKERHUB_USERNAME/task-manager-api:$GIT_SHA"
              echo "2. Check Docker Hub credentials in CI"
              echo "3. Check internet connection"
              exit 1
            fi
          
            # Step 5: Graceful shutdown
            echo ""
            echo "⏸️  Stopping backend (graceful shutdown 30s)..."
            docker compose stop -t 30 backend || true
            sleep 2
          
            # Step 6: Start new container
            echo "🚀 Starting backend with new image..."
            if ! docker compose up -d backend; then
              echo "❌ Failed to start container"
              docker compose logs backend --tail 20
              exit 1
            fi
          
            # Step 7: Health check
            echo ""
            echo "⏳ Checking app health (up to 30s)..."
            RETRY_COUNT=0
            MAX_RETRIES=30
          
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -s -f "$HEALTH_CHECK_URL" > /dev/null 2>&1; then
                echo "✅ App is healthy!"
                break
              fi
          
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "  Attempt $RETRY_COUNT/$MAX_RETRIES..."
                sleep 1
              fi
            done
          
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "❌ App failed to become healthy within 30s"
              echo ""
              echo "📋 Recent logs:"
              docker logs task_app --tail 30
              exit 1
            fi
          
            # Step 8: Cleanup
            echo ""
            echo "🧹 Cleaning up old images..."
            docker image prune -f
          
            # Success
            echo ""
            echo "✅ ========== DEPLOYMENT SUCCESSFUL =========="
            echo "Version: $GIT_SHA"
            echo "Image: $DOCKERHUB_USERNAME/task-manager-api:$GIT_SHA"
            echo "Status: Verified healthy"
            echo ""
          EOF

      - name: Verify Deployment
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          cat <<EOF > ~/.ssh/config
          Host homelab
            HostName $HOST
            User $USER
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config
          
          echo ""
          echo "🔍 Final verification:"
          ssh homelab << 'EOF'
            echo ""
            echo "Running containers:"
            docker ps --filter "name=task" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
            echo ""
            echo "App health check:"
            curl -s http://localhost:8081/actuator/health/ready | jq . || echo "Health endpoint: checking..."
            echo ""
          EOF