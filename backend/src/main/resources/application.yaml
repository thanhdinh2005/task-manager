spring:
  application:
    name: task-manager

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&amp;characterEncoding=UTF-8&amp;rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 1000
          order_inserts: true
          order_update: true
          batch_versioned_data: true


logging:
  org.hibernate.SQL: DEBUG
  org.springframework.orm.jpa: DEBUG

application:
  security:
    jwt:
      secret-key: ${SECRET_KEY}
      expiration: ${TOKEN_EXP}
      refresh-expiration-ms: ${REFRESH_EXP}

server:
  port: ${APP_PORT:8081}
  servlet:
    context-path: /api/v1