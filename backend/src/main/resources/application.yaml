spring:
  application:
    name: task-manager

server:
  port: ${APP_PORT:8081}
  servlet:
    context-path: /api/v1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    configUrl: /api/v1/api-docs/swagger-config
    url: /api/v1/api-docs
  api-docs:
    path: /api-docs

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5500}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always