spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task_db}?useUnicode=true&amp;characterEncoding=UTF-8&amp;rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 1000
          order_inserts: true
          order_update: true
          batch_versioned_data: true

logging:
  org.hibernate.SQL: DEBUG
  org.springframework.orm.jpa: DEBUG

application:
  security:
    jwt:
      secret-key: ${SECRET_KEY}
      expiration: ${TOKEN_EXP:900000}
      refresh-expiration-ms: ${REFRESH_EXP:604800000}
