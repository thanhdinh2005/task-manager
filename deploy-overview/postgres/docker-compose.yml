services:
  postgres:
    image: postgres:16-alpine
    container_name: task_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - task-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:5.4.1
    container_name: adminer
    ports:
      - "8083:8080"
    networks:
      - task-network
    depends_on:
      - postgres

networks:
  task-network:
    external: true
    driver: bridge
    name: task-network

volumes:
  postgres_data: